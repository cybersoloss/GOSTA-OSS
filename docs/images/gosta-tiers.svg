<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="t0" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#40916c"/>
    </linearGradient>
    <linearGradient id="t1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="t2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#533483"/>
      <stop offset="100%" stop-color="#6b44a0"/>
    </linearGradient>
    <linearGradient id="t3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="720" height="400" fill="url(#bg2)" rx="12"/>
  <text x="360" y="36" text-anchor="middle" fill="#e0e0e0" font-size="18" font-weight="600">Implementation Tiers</text>

  <!-- Tier 0 -->
  <rect x="40" y="58" width="150" height="280" rx="8" fill="url(#t0)" filter="url(#sh2)"/>
  <text x="115" y="86" text-anchor="middle" fill="white" font-size="18" font-weight="700">Tier 0</text>
  <text x="115" y="106" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">File-Based</text>
  <line x1="60" y1="118" x2="170" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="60" y="140" fill="rgba(255,255,255,0.9)" font-size="11">Markdown files</text>
  <text x="60" y="158" fill="rgba(255,255,255,0.9)" font-size="11">AI conversation</text>
  <text x="60" y="176" fill="rgba(255,255,255,0.9)" font-size="11">Manual signals</text>
  <text x="60" y="194" fill="rgba(255,255,255,0.9)" font-size="11">Governor reviews</text>
  <text x="60" y="212" fill="rgba(255,255,255,0.9)" font-size="11">No infrastructure</text>
  <rect x="55" y="290" width="120" height="28" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="115" y="309" text-anchor="middle" fill="#90ee90" font-size="11" font-weight="600">START HERE</text>

  <!-- Arrow -->
  <text x="210" y="200" fill="#555" font-size="20">&#x25B6;</text>

  <!-- Tier 1 -->
  <rect x="220" y="58" width="150" height="280" rx="8" fill="url(#t1)" filter="url(#sh2)"/>
  <text x="295" y="86" text-anchor="middle" fill="white" font-size="18" font-weight="700">Tier 1</text>
  <text x="295" y="106" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Coded Implementation</text>
  <line x1="240" y1="118" x2="350" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="240" y="140" fill="rgba(255,255,255,0.9)" font-size="11">Structured storage</text>
  <text x="240" y="158" fill="rgba(255,255,255,0.9)" font-size="11">Automated signals</text>
  <text x="240" y="176" fill="rgba(255,255,255,0.9)" font-size="11">Programmatic gates</text>
  <text x="240" y="194" fill="rgba(255,255,255,0.9)" font-size="11">API-driven OD</text>
  <text x="240" y="212" fill="rgba(255,255,255,0.9)" font-size="11">Single-agent coded</text>

  <!-- Arrow -->
  <text x="390" y="200" fill="#555" font-size="20">&#x25B6;</text>

  <!-- Tier 2 -->
  <rect x="400" y="58" width="150" height="280" rx="8" fill="url(#t2)" filter="url(#sh2)"/>
  <text x="475" y="86" text-anchor="middle" fill="white" font-size="18" font-weight="700">Tier 2</text>
  <text x="475" y="106" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11">Multi-Agent</text>
  <line x1="420" y1="118" x2="530" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="420" y="140" fill="rgba(255,255,255,0.9)" font-size="11">Persistent agents</text>
  <text x="420" y="158" fill="rgba(255,255,255,0.9)" font-size="11">Cross-agent signals</text>
  <text x="420" y="176" fill="rgba(255,255,255,0.9)" font-size="11">Orchestrated cycles</text>
  <text x="420" y="194" fill="rgba(255,255,255,0.9)" font-size="11">Automated health</text>
  <text x="420" y="212" fill="rgba(255,255,255,0.9)" font-size="11">Coded deliberation</text>

  <!-- Arrow -->
  <text x="570" y="200" fill="#555" font-size="20">&#x25B6;</text>

  <!-- Tier 3 -->
  <rect x="580" y="58" width="110" height="280" rx="8" fill="url(#t3)" filter="url(#sh2)"/>
  <text x="635" y="86" text-anchor="middle" fill="white" font-size="18" font-weight="700">Tier 3</text>
  <text x="635" y="106" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">Production</text>
  <line x1="595" y1="118" x2="675" y2="118" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="595" y="140" fill="rgba(255,255,255,0.9)" font-size="10">Full automation</text>
  <text x="595" y="156" fill="rgba(255,255,255,0.9)" font-size="10">Real-time signals</text>
  <text x="595" y="172" fill="rgba(255,255,255,0.9)" font-size="10">Predictive health</text>
  <text x="595" y="188" fill="rgba(255,255,255,0.9)" font-size="10">Auto-graduation</text>
  <text x="595" y="204" fill="rgba(255,255,255,0.9)" font-size="10">Audit trails</text>

  <!-- Bottom note -->
  <text x="360" y="370" text-anchor="middle" fill="#777" font-size="12">Same governance model at every tier — only the automation level changes</text>
  <text x="360" y="390" text-anchor="middle" fill="#777" font-size="12">Validate at Tier 0 before investing in coded implementations</text>
</svg>
